<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body id="register_form" class="login">
    <br><br><br><br><br><br><br>
    <section>
        <form action="">
            <p class="title">გაიარეთ რეგისტრაცია</p>
            <input id="fname" type="text" placeholder="სახელი *" required>
            <input id="lname" type="text" placeholder="გვარი *" required>
            <input id="age" type="text" placeholder="ასაკი">
            <input id="mail" type="email" placeholder="იმეილი *" required>
            <input id="password" type="password" placeholder="პაროლი *" required>
            <input id="address" type="text" placeholder="მისამართი">
            <input id="phone_number" type="text" placeholder="ტელეფონის ნომერი *" required>
            <input id="" type="text" placeholder="ზიპ კოდი">
            <select name="" id="gender" aria-placeholder="სქესი">
                <option value="MALE">მამრობითი</option>
                <option value="FEMALE">მდედრობითი</option>
            </select>
            <button type="submit">რეგისტრაცია</button>
        </form>
    </section>

    <footer>
        <br><br><br><br><br>
        <hr><br><br><br>
        <p>© 2023 <a href="">Step Railway</a>. ყველა უფლება დაცულია.</p>
        <br><br><br><br><br>
    </footer>

    <script src="./main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>   
</body>
</html>
